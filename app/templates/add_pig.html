<!DOCTYPE html>
<html>
<head>
    <title>Register Pig - Pig People Pro</title>
</head>
<body>

    <h1>🐖 Pig People Pro</h1>
    <h2>Register New Pig</h2>

    <hr>

    <form method="POST">

        <label>Pig ID:</label><br>
        <input type="text" name="pig_id" required><br><br>

        <label>Breed:</label><br>
        <input type="text" name="breed" required><br><br>

        <label>Age (Months):</label><br>
        <input type="number" name="age" required><br><br>

        <button type="submit">Register Pig</button>

    </form>

    <br>
    <hr>

    <a href="/dashboard">⬅ Back to Dashboard</a> |

</body>
</html>
