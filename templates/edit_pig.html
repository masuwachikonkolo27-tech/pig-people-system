<!DOCTYPE html>
<html>
<head>
    <title>Edit Pig</title>
</head>
<body>

<h2>Edit Pig</h2>

<form method="POST">
    Tag: <input type="text" name="tag" value="{{ pig.tag }}" required><br><br>
    Category: <input type="text" name="category" value="{{ pig.category }}" required><br><br>
    Weight: <input type="number" step="0.1" name="weight" value="{{ pig.weight }}" required><br><br>

    <button type="submit">Update</button>
</form>

<br>
<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
